<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña · El Kiosquillo</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="cuenta.css">
</head>
<body>

<div class="utility">
  <div class="container utility-in">
    <span>Envío en 24-48 h · Gratis a partir de 49&nbsp;€</span>
    <span class="utility-right">Atención por WhatsApp · Lun&nbsp;a&nbsp;Sáb</span>
  </div>
</div>

<header>
  <div class="container header-in">
    <a href="index.html" class="brand" aria-label="El Kiosquillo, inicio">
      <img src="images/Logo-sin-texto.png" class="brand-mark" alt="El Kiosquillo" aria-hidden="true">
      <span class="brand-name">El Kiosquillo</span>
    </a>
    <nav class="nav" aria-label="Principal">
      <a href="index.html#tienda">Chuches</a>
      <a href="caja.html">Crea tu caja</a>
      <a href="index.html#eventos">Fiestas y eventos</a>
    </nav>
    <div class="header-tools">
      <a class="tool" href="index.html" aria-label="Volver a la tienda" title="Volver a la tienda">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 7h14l-1.2 10.5a2 2 0 0 1-2 1.8H8.2a2 2 0 0 1-2-1.8L5 7Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M9 7a3 3 0 0 1 6 0" fill="none" stroke="currentColor" stroke-width="2"/></svg>
      </a>
    </div>
  </div>
</header>

<main class="account-page">
  <div class="container account-narrow">
    <div class="auth-card">
      <h1>Nueva contraseña</h1>
      <p class="sub">Escribe tu nueva contraseña para acceder a tu cuenta.</p>

      <div class="form-msg" id="msg"></div>

      <form id="newForm" novalidate>
        <div class="field">
          <label for="password">Nueva contraseña</label>
          <input type="password" id="password" autocomplete="new-password" minlength="6" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Guardar contraseña</button>
      </form>

      <p class="auth-alt"><a href="login.html">Volver a acceder</a></p>
    </div>
  </div>
</main>

<footer>
  <div class="container footer-bottom">
    <span>© 2026 El Kiosquillo · chuchebarata.com</span>
    <span><a href="aviso-legal.html">Aviso legal</a> · <a href="privacidad.html">Privacidad</a> · <a href="cookies.html">Cookies</a></span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="sesion.js"></script>
<script src="cookies-consent.js"></script>
<script>
(function () {
  const form = document.getElementById('newForm');
  const msg = document.getElementById('msg');

  function showMsg(text, ok) {
    msg.textContent = text;
    msg.classList.remove('ok', 'error');
    msg.classList.add(ok ? 'ok' : 'error', 'show');
  }

  // Al llegar desde el enlace del correo, Supabase crea una sesión de
  // recuperación automáticamente (detectSessionInUrl). Si no la hay, avisamos.
  form.addEventListener('submit', async e => {
    e.preventDefault();
    const btn = form.querySelector('button[type=submit]');
    btn.disabled = true;
    const res = await Auth.setNewPassword(document.getElementById('password').value);
    btn.disabled = false;
    if (!res.ok) { showMsg(res.error, false); return; }
    showMsg('¡Contraseña actualizada! Ya puedes acceder con ella.', true);
    setTimeout(() => location.href = 'perfil.html', 1500);
  });
})();
</script>
</body>
</html>
